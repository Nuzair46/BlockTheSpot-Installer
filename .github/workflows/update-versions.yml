name: Update Spotify versions.json

on:
  schedule:
    # Once per day at 03:20 UTC
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml packaging

      - name: Generate versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_versions.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- versions.json; then
            echo "No new Spotify versions found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add versions.json
          git commit -m "Update Spotify versions.json"
          git push origin HEAD:main
