name: CI Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      INSTALLER_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Generate Windows app resources
        run: go run github.com/akavel/rsrc@v0.10.2 -manifest assets/app.manifest -ico assets/blockthespot.ico -arch amd64 -o windows_app_resources_amd64.syso

      - name: Build installer
        run: |
          mkdir dist
          go build -trimpath -ldflags "-H=windowsgui -s -w -X main.installerVersion=$env:INSTALLER_VERSION" -o dist/BlockTheSpotInstaller.exe .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockTheSpotInstaller-windows-x64
          path: dist/BlockTheSpotInstaller.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: BlockTheSpotInstaller-windows-x64
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BlockTheSpotInstaller.exe
          generate_release_notes: true
